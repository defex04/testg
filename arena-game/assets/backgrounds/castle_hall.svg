<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="vault" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14100c"/>
      <stop offset="0.6" stop-color="#241c14"/>
      <stop offset="1" stop-color="#332820"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c322a"/>
      <stop offset="1" stop-color="#544538"/>
    </linearGradient>
    <linearGradient id="column" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a221b"/>
      <stop offset="0.45" stop-color="#5c4c3c"/>
      <stop offset="0.7" stop-color="#46392d"/>
      <stop offset="1" stop-color="#241d16"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a573f"/>
      <stop offset="0.5" stop-color="#55452f"/>
      <stop offset="1" stop-color="#3a2e1f"/>
    </linearGradient>
    <linearGradient id="carpet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8e2424"/>
      <stop offset="1" stop-color="#5c1616"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8e2828"/>
      <stop offset="1" stop-color="#581414"/>
    </linearGradient>
    <radialGradient id="windowglow" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffe9ad"/>
      <stop offset="0.55" stop-color="#f2c878"/>
      <stop offset="1" stop-color="#b98a4a"/>
    </radialGradient>
    <radialGradient id="torch" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd98a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hallglow" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#f4cd6f" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f4cd6f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- свод и дальняя стена -->
  <rect width="900" height="1100" fill="url(#vault)"/>
  <rect y="430" width="900" height="650" fill="url(#wall)"/>
  <!-- рёбра свода -->
  <g stroke="#1b1510" stroke-width="14" fill="none" opacity="0.8">
    <path d="M110 470 Q 450 60 790 470"/>
    <path d="M-40 520 Q 240 170 520 520" opacity="0.5"/>
    <path d="M380 520 Q 660 170 940 520" opacity="0.5"/>
  </g>
  <!-- кладка дальней стены -->
  <g stroke="#332a22" stroke-width="3" opacity="0.5">
    <path d="M0 560 H900 M0 660 H900 M0 760 H900 M0 860 H900 M0 960 H900"/>
    <path d="M150 560 V660 M450 560 V660 M750 560 V660"/>
    <path d="M300 660 V760 M600 660 V760"/>
    <path d="M150 760 V860 M450 760 V860 M750 760 V860"/>
  </g>

  <!-- арочные окна с тёплым светом -->
  <g>
    <path d="M170 530 a65 65 0 0 1 130 0 V750 H170 Z" fill="url(#windowglow)"/>
    <path d="M600 530 a65 65 0 0 1 130 0 V750 H600 Z" fill="url(#windowglow)"/>
    <g stroke="#3a2f24" stroke-width="9" fill="none">
      <path d="M235 468 V750 M170 600 H300"/>
      <path d="M665 468 V750 M600 600 H730"/>
    </g>
  </g>

  <!-- трон на возвышении -->
  <g>
    <rect x="330" y="880" width="240" height="130" fill="#46392c"/>
    <rect x="305" y="990" width="290" height="40" fill="#382d22"/>
    <path d="M395 700 h110 l18 60 v150 h-146 v-150 Z" fill="#241c14"/>
    <path d="M412 720 h76 l12 48 v126 h-100 v-126 Z" fill="#6a2020"/>
    <path d="M450 640 l24 46 h-48 Z" fill="#d8a93f"/>
    <circle cx="450" cy="700" r="14" fill="#f4cd6f"/>
  </g>

  <!-- знамёна -->
  <g>
    <path d="M120 470 h120 v260 l-60 46 -60 -46 Z" fill="url(#banner)"/>
    <path d="M660 470 h120 v260 l-60 46 -60 -46 Z" fill="url(#banner)"/>
    <g fill="#d8a93f">
      <path d="M180 560 l16 34 h-32 Z"/>
      <circle cx="180" cy="620" r="13"/>
      <path d="M720 560 l16 34 h-32 Z"/>
      <circle cx="720" cy="620" r="13"/>
    </g>
    <rect x="120" y="470" width="120" height="14" fill="#a3781f"/>
    <rect x="660" y="470" width="120" height="14" fill="#a3781f"/>
  </g>

  <!-- колонны-кулисы -->
  <g>
    <rect x="-30" y="220" width="150" height="900" fill="url(#column)"/>
    <rect x="780" y="220" width="150" height="900" fill="url(#column)"/>
    <rect x="-40" y="1080" width="170" height="46" fill="#2a221a"/>
    <rect x="770" y="1080" width="170" height="46" fill="#2a221a"/>
    <rect x="-40" y="200" width="170" height="40" fill="#2a221a"/>
    <rect x="770" y="200" width="170" height="40" fill="#2a221a"/>
  </g>

  <!-- факелы на колоннах -->
  <g>
    <circle cx="105" cy="640" r="120" fill="url(#torch)"/>
    <circle cx="795" cy="640" r="120" fill="url(#torch)"/>
    <rect x="96" y="640" width="18" height="56" rx="6" fill="#3a2c1c"/>
    <rect x="786" y="640" width="18" height="56" rx="6" fill="#3a2c1c"/>
    <path d="M105 596 c-16 22 -10 40 0 48 c10 -8 16 -26 0 -48 Z" fill="#ffb547"/>
    <path d="M795 596 c-16 22 -10 40 0 48 c10 -8 16 -26 0 -48 Z" fill="#ffb547"/>
    <path d="M105 608 c-8 14 -5 26 0 32 c5 -6 8 -18 0 -32 Z" fill="#ffe9ad"/>
    <path d="M795 608 c-8 14 -5 26 0 32 c5 -6 8 -18 0 -32 Z" fill="#ffe9ad"/>
  </g>

  <!-- пол: линия горизонта в нижней трети, бойцы стоят у нижнего края -->
  <rect y="1030" width="900" height="570" fill="url(#floor)"/>
  <!-- плиты в перспективе -->
  <g stroke="#2e2517" stroke-width="4" opacity="0.55" fill="none">
    <path d="M0 1120 H900 M0 1230 H900 M0 1360 H900 M0 1500 H900"/>
    <path d="M450 1030 L450 1600 M300 1030 L120 1600 M600 1030 L780 1600 M170 1030 L-160 1600 M730 1030 L1060 1600"/>
  </g>
  <!-- ковровая дорожка к трону -->
  <path d="M385 1030 H515 L640 1600 H260 Z" fill="url(#carpet)"/>
  <path d="M403 1030 H497 L612 1600 H288 Z" fill="none" stroke="#d8a93f" stroke-width="7" opacity="0.7"/>

  <!-- общее тёплое свечение зала и виньетка -->
  <rect width="900" height="1600" fill="url(#hallglow)"/>
  <path d="M0 0 H900 V1600 H0 Z" fill="none"/>
  <rect width="900" height="220" fill="#0a0705" opacity="0.5"/>
  <rect y="1480" width="900" height="120" fill="#0a0705" opacity="0.35"/>
</svg>
