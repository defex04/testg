<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Арена — демо боевого модуля</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- декоративный шрифт с кириллицей; офлайн просто откатится на Georgia -->
  <link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <script>
    // Открыто двойным кликом (file://)? Браузер в этом режиме блокирует
    // ES-модули и загрузку моделей — игра не может стартовать. Показываем
    // подсказку и сами переходим на локальный сервер (start.bat), как
    // только он поднимется. На http/https (GitHub Pages) скрипт молчит.
    (function () {
      var test = location.search.indexOf('fallback-test') !== -1;
      if (location.protocol !== 'file:' && !test) return;

      var PORTS = [8765, 8000];

      document.addEventListener('DOMContentLoaded', function () {
        var el = document.createElement('div');
        el.className = 'file-helper';
        el.innerHTML =
          '<div class="fh-card">' +
            '<div class="fh-title">⚜ DRAGON ARENA</div>' +
            '<p class="fh-sub">Игра открыта как файл (file://) — в этом режиме браузер запрещает загружать модули и 3D-модели, поэтому бой не стартует.</p>' +
            '<div class="fh-steps">' +
              '<div class="fh-step"><b>1.</b> Запустите <b>start.bat</b> в этой же папке</div>' +
              '<div class="fh-step"><b>2.</b> Эта вкладка сама перейдёт в игру</div>' +
            '</div>' +
            '<div class="fh-status">Ищу запущенный сервер…</div>' +
            '<a class="fh-link" href="http://localhost:8765/">Открыть вручную → localhost:8765</a>' +
            '<p class="fh-note">На GitHub Pages и любом http-хостинге игра работает сразу — ограничение касается только file://.</p>' +
          '</div>';
        document.body.appendChild(el);
        var status = el.querySelector('.fh-status');

        function ping(i) {
          var url = 'http://localhost:' + PORTS[i % PORTS.length] + '/';
          fetch(url, { mode: 'no-cors', cache: 'no-store' }).then(function () {
            status.textContent = 'Сервер найден — открываю игру…';
            status.className = 'fh-status ok';
            if (!test) location.replace(url);
          }).catch(function () {
            status.textContent = 'Жду start.bat… (сервер пока не запущен)';
            setTimeout(function () { ping(i + 1); }, 1200);
          });
        }
        ping(0);
      });
    })();
  </script>

  <div class="game">

              <div class="belt-slot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3.5h4M10.8 3.5v5L5.6 17a3.2 3.2 0 0 0 2.9 4.6h7a3.2 3.2 0 0 0 2.9-4.6l-5.2-8.5v-5"/><path d="M7.5 14.5h9"/></svg></div>
              <div class="belt-slot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3.5h4M10.8 3.5v5L5.6 17a3.2 3.2 0 0 0 2.9 4.6h7a3.2 3.2 0 0 0 2.9-4.6l-5.2-8.5v-5"/><path d="M7.5 14.5h9"/></svg></div>
              <div class="belt-slot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3.5h4M10.8 3.5v5L5.6 17a3.2 3.2 0 0 0 2.9 4.6h7a3.2 3.2 0 0 0 2.9-4.6l-5.2-8.5v-5"/><path d="M7.5 14.5h9"/></svg></div>

  <!-- гардероб (примерочная) -->

  <!-- окно информации о бое (открывается ссылкой «Бой #N» из чата) -->

  <div class="toast" id="toast"></div>

  <script type="module">
    // Ручной выбор сервера перед стартом игры: локальный (start.bat + Docker)
    // или Azure. Игра (js/main.js) загружается только после выбора —
    // js/net/net.js прочитает window.API_URL. Под file:// экран не нужен:
    // там игра не стартует, работает помощник выше.
    const SERVERS = {
      local: { url: 'http://localhost:8080',          name: 'Локальный сервер', desc: 'Docker на этом компьютере (localhost:8080)' },
      azure: { url: 'https://4.231.90.10.sslip.io',   name: 'Сервер Azure',     desc: 'Облако — общий мир для всех игроков' },
    };

    function chooseServer() {
      if (location.protocol === 'file:') return Promise.resolve(null);
      // внутри Telegram Mini App выбора нет: всегда боевой сервер (Azure)
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.initData) {
        if (tg.expand) tg.expand();
        return Promise.resolve(SERVERS.azure.url);
      }
      // подсказка по умолчанию: с внешнего хостинга (GitHub Pages) — Azure
      const hinted = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname)
        ? 'local' : 'azure';
      return new Promise((resolve) => {
        const el = document.createElement('div');
        el.className = 'file-helper';
        el.innerHTML =
          '<div class="fh-card">' +
            '<div class="fh-title">⚜ DRAGON ARENA</div>' +
            '<p class="fh-sub">Выберите сервер для игры</p>' +
            '<div class="srv-list">' +
              Object.entries(SERVERS).map(([id, s]) =>
                '<button class="srv-btn' + (id === hinted ? ' srv-hint' : '') + '" data-srv="' + id + '">' +
                  '<span class="srv-name">' + s.name + (id === hinted ? ' · рекомендуется' : '') + '</span>' +
                  '<span class="srv-desc">' + s.desc + '</span>' +
                '</button>').join('') +
            '</div>' +
          '</div>';
        el.addEventListener('click', (e) => {
          const btn = e.target.closest('[data-srv]');
          if (!btn) return;
          el.remove();
          resolve(SERVERS[btn.dataset.srv].url);
        });
        document.body.appendChild(el);
      });
    }

    const url = await chooseServer();
    if (url) window.API_URL = url;
    await import('./js/main.js');
  </script>
</body>
</html>
